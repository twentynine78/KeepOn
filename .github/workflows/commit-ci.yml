name: Commit
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"

      # chmod is a no-op on Windows; only the POSIX runners need it.
      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      # Builds both variants in a single Gradle invocation. assembleRelease exercises R8
      # minification + resource shrinking (the path that actually ships); assembleDebug keeps
      # the debug-only deps (compose.ui.tooling, glance preview) validated.
      - name: Build Debug and Release APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: KeepOn-debug-${{ matrix.os }}
          path: app/build/outputs/apk/debug/
          # keep 30 days
          retention-days: 30

      # No signingConfig in the repo, so AGP emits app-release-unsigned.apk: not installable
      # as-is, but R8 + shrinking still run, which is the point of building release here.
      - name: Upload Release APK artifact (unsigned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: KeepOn-release-unsigned-${{ matrix.os }}
          path: app/build/outputs/apk/release/
          # keep 30 days
          retention-days: 30
